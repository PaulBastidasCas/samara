<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupid Drag and Shoot - Diseño Perfecto</title>
    <link rel="stylesheet" href="../css/estilos_index.css">
</head>

<body>

    <div id="game-container">
        <div id="envelope-wrapper">
            <div id="envelope">
                <div class="flap-bottom"></div>
                <div class="flap-top"></div>
                <div id="envelope-heart">❤️</div>
            </div>
            <div class="title">❤️ FELIZ PRIMER MES ❤️</div>
        </div>

        <div id="bow-area">
            <div id="arrow"></div>
            <div id="bow">
                <div id="string"></div>
            </div>
        </div>

        <audio id="musica-fondo" loop>
            <source src="../recursos/And I Love Her.mp3" type="audio/mpeg">
            Tu navegador no soporta el elemento de audio.
        </audio>

        <div class="instructions">Apunta y dispara para lanzar la flecha de Cupido.❤️</div>
    </div>

    <script src="../javascript/script_index.js"></script>
</body>

</html>
